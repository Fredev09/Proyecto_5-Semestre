<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - CiviWeb Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f5f7;
            color: #222;
        }

        .admin-header {
            background: #111;
            color: white;
            padding: 16px 45px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        }

        .admin-logo {
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 800;
            font-size: 19px;
        }

        .admin-logo img {
            width: 180px;
            height: auto;
            object-fit: contain;
        }

        .admin-actions a {
            text-decoration: none;
            color: white;
            background: #981313;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            margin-left: 10px;
        }

        .container {
            max-width: 1350px;
            margin: 45px auto;
            padding: 0 35px;
        }

        .page-title {
            background: white;
            border-radius: 22px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .page-title h1 {
            color: #981313;
            font-size: 34px;
            margin-bottom: 8px;
        }

        .page-title p {
            color: #666;
            font-size: 16px;
        }

        .table-card {
            background: white;
            border-radius: 22px;
            padding: 28px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #981313;
            color: white;
        }

        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th:first-child {
            border-radius: 14px 0 0 14px;
        }

        th:last-child {
            border-radius: 0 14px 14px 0;
        }

        tbody tr:hover {
            background: #f9eeee;
        }

        .badge {
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .admin {
            background: #981313;
            color: white;
        }

        .usuario {
            background: #eee;
            color: #333;
        }

        .confirmado {
            background: #e7f8ee;
            color: #137333;
        }

        .no-confirmado {
            background: #fdecec;
            color: #b00020;
        }

        .btn-delete {
            background: #b00020;
            color: white;
            padding: 9px 14px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }

        .btn-delete:hover {
            background: #7c0015;
        }

        /* =========================================
        INICIO RESPONSIVE USUARIOS ADMIN
        PEGAR AL FINAL
        ========================================= */

        /* Checkbox oculto */
        #admin-menu-toggle {
            display: none;
        }

        /* Botón hamburguesa */
        .admin-hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            margin-left: auto;
            z-index: 2001;
        }

        .admin-hamburger span {
            width: 30px;
            height: 3px;
            background: white;
            border-radius: 4px;
        }

        /* Laptop */
        @media(max-width: 1200px) {

            .container {
                max-width: 100%;
            }

            .page-title h1 {
                font-size: 32px;
            }
        }

        /* Tablet */
        @media(max-width: 950px) {

            .admin-header {
                padding: 18px 20px;
                position: relative;
                flex-wrap: wrap;
                flex-direction: row;
            }

            .admin-logo img {
                width: 155px;
            }

            /* Mostrar hamburguesa */
            .admin-hamburger {
                display: flex;
            }

            /* Menú oculto */
            .admin-actions {
                display: none;
                position: absolute;
                top: 100%;
                right: 20px;
                flex-direction: column;
                background: #111;
                padding: 18px;
                border-radius: 0 0 0 18px;
                width: 240px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.35);
            }

            /* Activar menú */
            #admin-menu-toggle:checked + .admin-hamburger + .admin-actions {
                display: flex;
            }

            .admin-actions a {
                width: 100%;
                text-align: center;
                margin: 0 0 10px 0;
            }

            .admin-actions a:last-child {
                margin-bottom: 0;
            }

            .container {
                padding: 0 18px;
                margin: 30px auto;
            }

            .page-title,
            .table-card {
                padding: 24px;
            }

            .page-title h1 {
                font-size: 28px;
            }

            /* Tabla más ancha para scroll cómodo */
            table {
                min-width: 850px;
            }
        }

        /* Celular */
        @media(max-width: 768px) {

            .admin-header {
                padding: 15px;
            }

            .admin-logo img {
                width: 135px;
            }

            .container {
                padding: 0 12px;
            }

            .page-title,
            .table-card {
                padding: 20px;
                border-radius: 18px;
            }

            .page-title h1 {
                font-size: 24px;
            }

            .page-title p {
                font-size: 14px;
                line-height: 1.7;
            }

            th,
            td {
                padding: 14px;
                font-size: 14px;
            }

            td strong {
                font-size: 15px;
            }

            .badge {
                padding: 6px 12px;
                font-size: 12px;
            }

            .btn-delete {
                display: inline-block;
                padding: 8px 12px;
                font-size: 12px;
                white-space: nowrap;
            }
        }

        /* Pantallas pequeñas */
        @media(max-width: 480px) {

            .admin-actions {
                width: 100%;
                right: 0;
                border-radius: 0;
            }

            .page-title h1 {
                font-size: 21px;
            }

            .page-title p {
                font-size: 13px;
            }

            table {
                min-width: 780px;
            }

            th,
            td {
                font-size: 13px;
            }
        }

        /* =========================================
        FIN RESPONSIVE USUARIOS ADMIN
        ========================================= */
    </style>
</head>

<body>

<header class="admin-header">
    <div class="admin-logo">
        <img src="{{ url_for('static', filename='imagenes/Civi.png') }}" alt="Logo">
    </div>

    <!-- INICIO MENU HAMBURGUESA ADMIN -->
    <input type="checkbox" id="admin-menu-toggle">

    <label for="admin-menu-toggle" class="admin-hamburger">
        <span></span>
        <span></span>
        <span></span>
    </label>
    <!-- FIN MENU HAMBURGUESA ADMIN -->

    <div class="admin-actions">
        <a href="{{ url_for('dashboard') }}"><i class="fa fa-arrow-left"></i> Dashboard</a>
        <a href="{{ url_for('register') }}"><i class="fa fa-user-plus"></i> Crear usuario</a>
    </div>
</header>

<main class="container">

    <section class="page-title">
        <h1>Gestión de Usuarios</h1>
        <p>Administra las cuentas, roles y accesos del sistema.</p>
    </section>

    <section class="table-card">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Correo</th>
                    <th>Rol</th>
                    <th>Confirmado</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody>
                {% for u in usuarios %}
                <tr>
                    <td>{{ u.id }}</td>
                    <td><strong>{{ u.username }}</strong></td>
                    <td>{{ u.email }}</td>
                    <td>
                        <span class="badge {{ 'admin' if u.rol == 'admin' else 'usuario' }}">
                            {{ u.rol }}
                        </span>
                    </td>
                    <td>
                        {% if u.email_confirmado %}
                            <span class="badge confirmado">Sí</span>
                        {% else %}
                            <span class="badge no-confirmado">No</span>
                        {% endif %}
                    </td>
                    <td>
                        <a class="btn-delete"
                           href="{{ url_for('eliminar_usuario', id=u.id) }}"
                           onclick="return confirm('¿Seguro que deseas eliminar este usuario?')">
                           <i class="fa fa-trash"></i> Eliminar
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </section>

</main>

</body>
</html>
