<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Correo confirmado - Constructora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a1a, #891010);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .confirm-container {
            display: flex;
            width: 800px;
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .left-side {
            width: 40%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .left-side img {
            width: 150px;
        }

        .right-side {
            width: 60%;
            padding: 45px 50px;
            text-align: center;
            box-sizing: border-box;
        }

        h2 {
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .message {
            font-size: 18px;
            color: #444;
            margin: 20px 0;
        }

        .success-icon {
            font-size: 60px;
            color: #16a34a;
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            background: #891010;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }

        .btn:hover {
            background: #6f0c0c;
        }
    </style>
</head>

<body>

    <div class="confirm-container">

        <!-- IZQUIERDA -->
        <div class="left-side">
            <img src="{{ url_for('static', filename='imagenes/LOGO.png') }}" alt="LOGO">
        </div>

        <!-- DERECHA -->
        <div class="right-side">

            <i class="fa fa-circle-check success-icon"></i>

            <h2>Correo confirmado</h2>

            <p class="message">
                {{ mensaje }}
            </p>

            <a href="{{ url_for('login') }}" class="btn">
                <i class="fa fa-right-to-bracket"></i> Ir al login
            </a>

        </div>

    </div>

</body>
</html>
