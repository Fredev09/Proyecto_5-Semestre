<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Inmueble</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="shortcut icon" href="../static/imagenes/Logo Civi.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a1a, #981313);
            min-height: 100vh;
            padding: 45px;
        }

        .form-container {
            max-width: 900px;
            margin: auto;
            background: white;
            border-radius: 26px;
            overflow: hidden;
            box-shadow: 0 18px 45px rgba(0,0,0,0.35);
        }

        .form-header {
            background: #111;
            color: white;
            padding: 28px;
            text-align: center;
        }

        .form-header h1 {
            font-size: 34px;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #ddd;
        }

        form {
            padding: 35px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group.full {
            grid-column: span 2;
        }

        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #222;
        }

        input, select, textarea {
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 15px;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #981313;
            box-shadow: 0 0 0 3px rgba(152,19,19,0.12);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .buttons {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        button, .btn-back {
            border: none;
            padding: 14px 24px;
            border-radius: 28px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            font-size: 15px;
        }

        button {
            background: #981313;
            color: white;
        }

        .btn-back {
            background: #eee;
            color: #222;
        }

        @media(max-width: 800px) {
            form {
                grid-template-columns: 1fr;
            }

            .input-group.full,
            .buttons {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>

<div class="form-container">
    <div class="form-header">
        <h1>Registrar Inmueble</h1>
        <p>Agrega casas, apartamentos o lotes al módulo inmobiliario.</p>
    </div>

    <form 
    method="POST" enctype="multipart/form-data">
        <div class="input-group">
            <label>Título</label>
            <input type="text" name="titulo" placeholder="Ej: Apartamento moderno" required>
        </div>

        <div class="input-group">
            <label>Tipo</label>
            <select name="tipo" required>
                <option value="Casa">Casa</option>
                <option value="Apartamento">Apartamento</option>

            </select>
        </div>

        <div class="input-group">
    <label>Tipo de negocio</label>
    <select name="tipo_negocio" required>
        <option value="Venta">Venta</option>
        <option value="Arriendo">Arriendo</option>
    </select>
</div>

        <div class="input-group">
            <label>Ubicación</label>
            <input type="text" name="ubicacion" placeholder="Ej: Montería, Córdoba" required>
        </div>

        <div class="input-group">
            <label>Precio</label>
            <input type="number" name="precio" placeholder="Ej: 320000000" required>
        </div>

        <div class="input-group">
            <label>Estado</label>
            <select name="estado">
                <option value="Disponible">Disponible</option>
                <option value="Reservado">Reservado</option>
                <option value="Vendido">Vendido</option>
            </select>
        </div>

        <div class="input-group">
            <label>Imagen</label>
           <input type="file" name="imagen" accept="image/*" required>
        </div>
        <div class="input-group full">
    <label>Galería del inmueble</label>
    <input type="file" name="galeria" accept="image/*,video/mp4" multiple>
    <small>Puedes subir varias fotos y un video MP4 corto del inmueble.</small>
</div>

        <div class="input-group full">
            <label>Descripción</label>
            <textarea name="descripcion" placeholder="Describe las características del inmueble"></textarea>
        </div>

        <div class="buttons">
            <a href="{{ url_for('inmobiliaria_admin') }}" class="btn-back">
                <i class="fa fa-arrow-left"></i> Volver
            </a>

            <button type="submit">
                <i class="fa fa-save"></i> Guardar inmueble
            </button>
        </div>
    </form>
</div>

</body>
</html>
