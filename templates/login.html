<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Constructora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a1a, #891010);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

          .login-container {
            display: flex;
            width: 800px;
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        /* LADO IZQUIERDO (LOGO) */
        .left-side {
            width: 40%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .left-side img {
            width: 140px;
        }

        /* (FORMULARIO) */
            .right-side {
            width: 60%;
            padding: 40px 50px;
            box-sizing: border-box;
        }

        .right-side h2 {
            margin: 0;
            color: #1a1a1a;
        }

        .right-side p {
            color: #666;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            font-weight: bold;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #b91c1c;
        }

        button {
            width: 100%;
            padding: 13px;
            background: #891010;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #7f1d1d;
        }

        .links {
            margin-top: 20px;
            text-align: center;
        }

        .links a {
            color: #b91c1c;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .input-icon i.fa-user,
        .input-icon i.fa-lock {
            left: 12px;
        }

        .input-icon input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 45px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .toggle-password {
            right: 12px;
            cursor: pointer;
        }

        .alert {
            margin: 15px 0;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .alert.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #22c55e;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: #891010;
            padding: 10px;
            border-radius: 50%;
            text-decoration: none;
            transition: 0.3s;
            z-index: 1000;
        }

        .back-home:hover {
            background: #c11b1b;
            transform: scale(1.1);
        }

        .alert.danger {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }

        /* =========================================
        INICIO RESPONSIVE LOGIN
        PEGAR AL FINAL
        ========================================= */

        /* Mejor control */
        * {
            box-sizing: border-box;
        }

        body {
            padding: 20px;
            position: relative;
        }

        /* Contenedor flexible */
        .login-container {
            max-width: 850px;
            width: 100%;
        }

        /* Laptop */
        @media (max-width: 992px) {

            .login-container {
                width: 95%;
            }

            .left-side img {
                width: 120px;
            }

            .right-side {
                padding: 35px;
            }

            .right-side h2 {
                font-size: 26px;
            }
        }

        /* Tablet */
        @media (max-width: 768px) {

            body {
                padding: 15px;
                align-items: center;
            }

            .login-container {
                flex-direction: column;
                width: 100%;
                border-radius: 18px;
            }

            .left-side,
            .right-side {
                width: 100%;
            }

            .left-side {
                padding: 28px 20px;
            }

            .left-side img {
                width: 130px;
            }

            .right-side {
                padding: 28px 22px;
            }

            .right-side h2 {
                font-size: 24px;
                line-height: 1.4;
            }

            .right-side p {
                font-size: 14px;
                margin-bottom: 20px;
            }

            .input-group label {
                font-size: 14px;
            }

            .input-icon input {
                padding: 12px 42px;
                font-size: 14px;
            }

            button {
                padding: 14px;
                font-size: 15px;
            }

            .links a {
                display: inline-block;
                margin-top: 8px;
                font-size: 14px;
            }

            .back-home {
                top: 15px;
                left: 15px;
                padding: 9px;
            }
        }

        /* Celulares */
        @media (max-width: 480px) {

            body {
                padding: 10px;
            }

            .login-container {
                border-radius: 16px;
            }

            .left-side {
                padding: 22px 15px;
            }

            .left-side img {
                width: 110px;
            }

            .right-side {
                padding: 22px 18px;
            }

            .right-side h2 {
                font-size: 21px;
            }

            .right-side p {
                font-size: 13px;
            }

            .input-icon i.fa-user,
            .input-icon i.fa-lock {
                left: 10px;
            }

            .toggle-password {
                right: 10px;
            }

            .input-icon input {
                padding: 12px 38px;
                font-size: 14px;
            }

            .alert {
                padding: 10px;
                font-size: 13px;
            }

            button {
                padding: 13px;
                font-size: 14px;
            }

            .back-home {
                padding: 8px;
                top: 10px;
                left: 10px;
            }
        }

        /* Pantallas muy pequeñas */
        @media (max-width: 360px) {

            .right-side h2 {
                font-size: 19px;
            }

            .right-side p {
                font-size: 12px;
            }

            .input-icon input {
                font-size: 13px;
            }
        }

        /* =========================================
        FIN RESPONSIVE LOGIN
        ========================================= */
    </style>

</head>
<body>


    <a href="{{ url_for('index') }}" class="back-home">
        <i class="fa fa-arrow-left"></i>
    </a>

    <div class="login-container">
        <!-- tu contenido actual -->

        <!-- IZQUIERDA -->
        <div class="left-side">
            <img src="{{ url_for('static', filename='imagenes/LOGO.png') }}" alt="LOGO">
        </div>

        <!-- DERECHA -->
        <div class="right-side">
            <center><h2>Bienvenido al portal administrativo</h2></center>
           <center> <p>Acceso al sistema de la constructora</p></center>

            {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert {{ category }}">
        <i class="fa fa-circle-check"></i> {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

           <form method="POST">
                
                <div class="input-group">
    <label>Usuario</label>
    <div class="input-icon">
        <i class="fa fa-user"></i>
        <input type="text" name="username" placeholder="Ingresa tu usuario" required>
    </div>
</div>

<div class="input-group">
    <label>Contraseña</label>
    <div class="input-icon">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
        <i class="fa fa-eye toggle-password" onclick="togglePassword()"></i>
    </div>
</div>

                <button type="submit">Iniciar sesión</button>

            </form>

            <div class="links">
                <a href="{{ url_for('recover') }}">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>

    <script>
function togglePassword() {
    const input = document.getElementById("password");
    const icon = document.querySelector(".toggle-password");

    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>
</body>
</html>
