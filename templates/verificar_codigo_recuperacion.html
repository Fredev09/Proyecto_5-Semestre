<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar código - Constructora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a1a, #891010);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-container {
            display: flex;
            width: 800px;
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .left-side {
            width: 40%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .left-side img {
            width: 150px;
        }

        .right-side {
            width: 60%;
            padding: 45px 50px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: #1a1a1a;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: center;
        }

        .input-group label {
            font-weight: bold;
            color: #222;
        }

        .input-icon {
            position: relative;
            margin-top: 6px;
        }

        .input-icon i {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            left: 12px;
        }

        .input-icon input {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            display: block;
            padding: 12px 40px;
            border-radius: 8px;
            border: 1px solid #ccc;
            text-align: center;
            font-size: 18px;
            letter-spacing: 4px;
            font-weight: bold;
        }

        .input-icon input:focus {
            border-color: #891010;
            outline: none;
        }

        button {
            width: 100%;
            max-width: 320px;
            margin: 15px auto 0;
            display: block;
            padding: 13px;
            background: #891010;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #6f0c0c;
        }

        .alert {
            margin-bottom: 15px;
            background: #891010;
            color: white;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .links {
            margin-top: 20px;
            text-align: center;
        }

        .links a {
            color: #b91c1c;
            text-decoration: none;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }

        /* =========================================
        INICIO RESPONSIVE VERIFICAR CODIGO
        PEGAR AL FINAL
        ========================================= */

        /* Mejor control */
        * {
            box-sizing: border-box;
        }

        body {
            padding: 20px;
        }

        /* Contenedor adaptable */
        .reset-container {
            max-width: 850px;
            width: 100%;
        }

        /* Alertas mejoradas */
        .alert.success {
            background: #dcfce7;
            color: #166534;
        }

        .alert.danger {
            background: #fee2e2;
            color: #991b1b;
        }

        /* Input premium */
        .input-icon input {
            font-size: 20px;
            letter-spacing: 6px;
            outline: none;
        }

        /* Laptop */
        @media (max-width: 992px) {

            .reset-container {
                width: 95%;
            }

            .left-side img {
                width: 130px;
            }

            .right-side {
                padding: 38px 35px;
            }

            h2 {
                font-size: 28px;
            }

            .subtitle {
                font-size: 15px;
            }
        }

        /* Tablet */
        @media (max-width: 768px) {

            body {
                padding: 15px;
            }

            .reset-container {
                flex-direction: column;
                width: 100%;
                border-radius: 18px;
            }

            .left-side,
            .right-side {
                width: 100%;
            }

            .left-side {
                padding: 28px 20px;
            }

            .left-side img {
                width: 125px;
            }

            .right-side {
                padding: 30px 24px;
            }

            h2 {
                font-size: 24px;
            }

            .subtitle {
                font-size: 14px;
                line-height: 1.6;
                margin-bottom: 20px;
            }

            .input-group {
                margin-bottom: 16px;
            }

            .input-group label {
                font-size: 14px;
            }

            .input-icon input {
                padding: 12px 42px;
                font-size: 18px;
                letter-spacing: 5px;
            }

            .input-icon i {
                left: 10px;
            }

            button {
                padding: 14px;
                font-size: 15px;
            }

            .links a {
                display: inline-block;
                font-size: 14px;
            }
        }

        /* Celulares */
        @media (max-width: 480px) {

            body {
                padding: 10px;
            }

            .reset-container {
                border-radius: 16px;
            }

            .left-side {
                padding: 22px 15px;
            }

            .left-side img {
                width: 105px;
            }

            .right-side {
                padding: 24px 18px;
            }

            h2 {
                font-size: 21px;
            }

            .subtitle {
                font-size: 13px;
            }

            .input-group {
                margin-bottom: 14px;
            }

            .input-icon input {
                padding: 12px 38px;
                font-size: 17px;
                letter-spacing: 4px;
            }

            .alert {
                padding: 10px;
                font-size: 13px;
            }

            button {
                padding: 13px;
                font-size: 14px;
            }

            .links a {
                font-size: 13px;
            }
        }

        /* Pantallas pequeñas */
        @media (max-width: 360px) {

            h2 {
                font-size: 19px;
            }

            .subtitle {
                font-size: 12px;
            }

            .input-icon input {
                font-size: 15px;
                letter-spacing: 3px;
            }
        }

        /* =========================================
        FIN RESPONSIVE VERIFICAR CODIGO
        ========================================= */
    </style>
</head>

<body>

<div class="reset-container">

    <div class="left-side">
        <img src="{{ url_for('static', filename='imagenes/LOGO.png') }}" alt="LOGO">
    </div>

    <div class="right-side">

        <h2><i class="fa fa-shield-halved"></i> Verificar código</h2>
        <p class="subtitle">Ingresa el código enviado a tu correo</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="input-group">
                <label>Código de recuperación</label>
                <div class="input-icon">
                    <i class="fa fa-key"></i>
                    <input type="text" name="codigo" maxlength="6" placeholder="000000" required>
                </div>
            </div>

            <button type="submit">
                <i class="fa fa-check"></i> Verificar código
            </button>

        </form>

        <div class="links">
            <a href="{{ url_for('recover') }}">
                <i class="fa fa-arrow-left"></i> Enviar otro código
            </a>
        </div>

    </div>

</div>

</body>
</html>
