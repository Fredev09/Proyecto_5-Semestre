<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Confirmar código - Constructora</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #891010);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .confirm-container {
      display: flex;
      width: 850px;
      background: #ffffff;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    .left-side {
      width: 40%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .left-side img {
      width: 210px;
      max-width: 100%;
    }

    .right-side {
      width: 60%;
      padding: 50px;
      box-sizing: border-box;
      text-align: center;
    }

    .icon-box {
      width: 70px;
      height: 70px;
      background: #891010;
      color: white;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 18px;
    }

    h2 {
      margin: 0;
      color: #1a1a1a;
      font-size: 30px;
    }

    .subtitle {
      color: #666;
      margin: 15px 0 25px;
    }

    .alert {
      margin-bottom: 18px;
      background: #891010;
      color: white;
      border-radius: 10px;
      padding: 13px;
      text-align: center;
    }

    .codigo-input {
      width: 100%;
      padding: 16px;
      font-size: 24px;
      text-align: center;
      letter-spacing: 8px;
      border: 1px solid #ccc;
      border-radius: 14px;
      margin-bottom: 20px;
      outline: none;
    }

    .codigo-input:focus {
      border-color: #891010;
      box-shadow: 0 0 0 3px rgba(137,16,16,0.15);
    }

    .btn-confirmar {
      width: 100%;
      border: none;
      background: linear-gradient(135deg, #891010, #c11b1b);
      color: white;
      padding: 15px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    .btn-confirmar:hover {
      background: linear-gradient(135deg, #c11b1b, #891010);
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.35);
    }

    .links {
      margin-top: 25px;
    }

    .links a {
      color: #b91c1c;
      text-decoration: none;
      font-weight: bold;
    }

    .links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .confirm-container {
        flex-direction: column;
        width: 92%;
      }

      .left-side,
      .right-side {
        width: 100%;
      }

      .right-side {
        padding: 35px 25px;
      }
    }
  </style>
</head>

<body>

  <div class="confirm-container">

    <div class="left-side">
      <img src="{{ url_for('static', filename='imagenes/LOGO.png') }}" alt="LOGO">
    </div>

    <div class="right-side">

      <div class="icon-box">
        <i class="fa fa-envelope"></i>
      </div>

      <h2>Confirma tu correo</h2>
      <p class="subtitle">Ingresa el código de 6 dígitos que enviamos a tu correo</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert {{ category }}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('confirmar_codigo') }}">
        <input 
          type="text" 
          name="codigo" 
          class="codigo-input" 
          maxlength="6" 
          placeholder="000000"
          required
        >

        <button type="submit" class="btn-confirmar">
          <i class="fa fa-circle-check"></i> Confirmar código
        </button>
      </form>

      <div class="links">
  <a href="{{ url_for('login') }}">
    <i class="fa fa-arrow-left"></i> Ir al login
  </a>

  <br><br>

  <a href="{{ url_for('register') }}">
    <i class="fa fa-user-plus"></i> Volver al registro
  </a>
</div>

    </div>

  </div>

</body>
</html>
